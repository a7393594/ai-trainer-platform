version: '3.8'

services:
  # 本地 Qdrant 向量資料庫
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # AI 引擎（開發用，正式環境部署到 Railway/Fly.io）
  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file:
      - ./ai-engine/.env
    volumes:
      - ./ai-engine:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - qdrant

volumes:
  qdrant_data:
