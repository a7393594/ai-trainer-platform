name: ai-engine tests

on:
  push:
    paths:
      - 'ai-engine/**'
      - '.github/workflows/ai-engine-tests.yml'
  pull_request:
    paths:
      - 'ai-engine/**'
      - '.github/workflows/ai-engine-tests.yml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # 只裝測試必要套件（tests/conftest.py 會 stub 外部服務）
          pip install pytest pytest-asyncio pytest-mock httpx \
                      pydantic pydantic-settings fastapi

      - name: Run pytest
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test-key
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short
