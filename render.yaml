services:
  - type: web
    name: ai-trainer-engine
    runtime: docker
    dockerfilePath: ai-engine/Dockerfile
    dockerContext: ai-engine
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
